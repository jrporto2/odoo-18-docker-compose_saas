services:
  postgres:
    image: postgres:16
    container_name: c_pgsaas
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=en_US.UTF-8
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ../postgres/db:/var/lib/postgresql/data
      - ../postgres/custom-init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: c_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_WTF_CSRF_ENABLED=False
      - PGADMIN_LISTEN_PORT=5050
      - SCRIPT_NAME=/pgadmin
    volumes:
      - ../pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_net
    ports:
      - "0.0.0.0:5050:5050"

  nginx:
    image: nginx:1.26.1
    container_name: c_nginxsaas
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/certs:/etc/nginx/ssl
      - ../nginx/logs:/var/log/nginx
      - ../nginx/nginx-cache:/var/cache/nginx 
    networks:
      - internal_net
      - public_net

networks:
  internal_net:
    name: internal_net
    driver: bridge
    internal: true

  public_net:
    name: public_net
    driver: bridge
