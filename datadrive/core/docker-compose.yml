services:
  postgres:
    container_name: c_pgsaas
    image: postgres:16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=en_US.UTF-8
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}  || exit 1"]
      timeout: 5s
      interval: 30s
      retries: 3
    networks:
      - internal_net
    restart: unless-stopped
    volumes:
      - ../postgres/db:/var/lib/postgresql/data
      - ../postgres/custom-init-scripts:/docker-entrypoint-initdb.d
  pgadmin:
    container_name: c_pgadmin
    image: dpage/pgadmin4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_LISTEN_PORT=5050
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED=False
      # Configuraciones para proxy inverso
      - PGADMIN_CONFIG_LOGIN_BANNER="Accesso autorizado solamente"
      - PGADMIN_CONFIG_CONSOLE_LOG_LEVEL=10  # Debug
    networks:
      - internal_net
    restart: unless-stopped
    volumes:
      - ../pgadmin:/var/lib/pgadmin
  nginx:
    container_name: c_nginxsaas
    image: nginx:1.26.1
    networks:
      - internal_net
      - public_net
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/certs:/etc/nginx/ssl
      - ../nginx/logs:/var/log/nginx
      - ../nginx/nginx-cache:/var/cache/nginx
networks:
  internal_net:
    name: internal_net
    driver: bridge
    internal: true
  public_net:
    name: public_net
    driver: bridge
 
logging:
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
