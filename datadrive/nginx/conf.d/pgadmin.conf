server {
    listen 80;
    server_name pgadmin.multipath.net.pe;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl;
    http2 on;  # ← Nueva sintaxis
    server_name pgadmin.multipath.net.pe;

    ssl_certificate /etc/nginx/ssl/pgadmin.multipath.net.pe.crt;
    ssl_certificate_key /etc/nginx/ssl/pgadmin.multipath.net.pe.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;
    set $pgadmin_backend c_pgadmin;

    location / {
        proxy_pass http://$pgadmin_backend:5050;

        # Headers básicos
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Manejo de cookies - CRÍTICO para pgAdmin
        proxy_cookie_path / /;
        proxy_cookie_domain localhost $host;

        # Deshabilitar caché para páginas de autenticación
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffers
        proxy_buffering off;

        # Redirecciones
        proxy_redirect http://$pgadmin_backend:5050 https://$host;
        proxy_redirect http://c_pgadmin:5050 https://$host;
    }
}

